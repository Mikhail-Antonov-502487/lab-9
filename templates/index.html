<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список пройденных игр</title>
    <style>
        body {
            background: #1e1e2f;
            font-family: Arial, sans-serif;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #2a2a3a;
            padding: 20px;
            border-radius: 15px;
        }
        
        .header {
            background: #3a3a4a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            margin: 0;
            color: #ff6b6b;
        }
        
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #3a3a4a;
            color: #fff;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-add {
            background: #4ecdc4;
            color: #1e1e2f;
        }
        
        .btn-clear {
            background: #ff6b6b;
            color: white;
            width: 100%;
            margin-top: 20px;
        }
        
        .game-item {
            background: #3a3a4a;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        /* Год издания выводится полужирным (по заданию) */
        .game-year {
            font-weight: bold;
            color: #4ecdc4;
        }
        
        .empty {
            text-align: center;
            color: #888;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Список пройденных игр</h1>
        </div>
        
        <form method="POST" action="/add">
            <div class="form-group">
                <input type="text" name="game" placeholder="Название игры" required>
                <input type="number" name="year" placeholder="Год издания" required>
                <button type="submit" class="btn-add">➕ Добавить</button>
            </div>
        </form>
        
        <div class="games-list">
            <h3>Пройденные игры ({{ games|length }})</h3>
            {% for game in games %}
                <div class="game-item">
                    <span>{{ game.game }}</span>
                    <span class="game-year">{{ game.year }}</span>
                </div>
            {% else %}
                <div class="empty">Пока нет добавленных игр</div>
            {% endfor %}
        </div>
        
        <form method="GET" action="/clear">
            <button type="submit" class="btn-clear">🗑️ Clear — очистить всё</button>
        </form>
    </div>
</body>
</html>
